name: Deploy Fullstack Application

on:
  push:
    branches:
      - main # Runs whenever you push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 3.80.37.65
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/login_site
            git pull origin main
            
            # Stop legacy PM2 process if running
            if command -v pm2 &> /dev/null; then
              pm2 stop aura-backend || true
              pm2 delete aura-backend || true
            fi
            
            # Run production containers
            docker compose -f docker-compose.prod.yml up -d --build
            
            # Update host Nginx reverse-proxy configuration and reload
            sudo cp ~/login_site/nginx-ec2-host.conf /etc/nginx/sites-available/default
            sudo nginx -t && sudo systemctl reload nginx
            
            # Clean up unused Docker images to save space
            docker image prune -f
