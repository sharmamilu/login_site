version: '3.8'

services:
  mongodb_new:
    image: mongo:latest
    container_name: login_site_mongodb
    ports:
      - "27019:27017" # Maps host 27019 to container 27017 to prevent local conflicts
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ./server
      target: development
    container_name: login_site_backend
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb_new:27017/login_site}
      - PORT=5000
      - API_ENCRYPTION_KEY=sharmamilu_login_site_secret_encryption_key_2026
    depends_on:
      - mongodb_new
    volumes:
      - ./server:/app
      - /app/node_modules

  frontend:
    build:
      context: .
      target: development
    container_name: login_site_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_PROXY_TARGET=http://backend:5000
    depends_on:
      - backend
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./vite.config.js:/app/vite.config.js
      - /app/node_modules

volumes:
  mongodb_data:
